<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Chat UI Demo</title>
    <script type="module" src="/main.ts"></script>
  </head>
  <body>
    <main class="demo-shell">
      <header class="demo-header">
        <div>
          <p>Component demo</p>
          <h1>Agent Chat UI</h1>
        </div>
        <div class="demo-controls" aria-label="Demo scenarios">
          <button type="button" data-demo-status="idle">Idle</button>
          <button type="button" data-demo-status="sending">Sending</button>
          <button type="button" data-demo-status="offline">Offline</button>
          <button type="button" data-demo-status="queued">Queued</button>
          <button type="button" data-demo-status="replaying">Replaying</button>
          <button type="button" data-demo-status="failed">Failed</button>
        </div>
      </header>
      <agent-chat id="demo-chat"></agent-chat>
      <section class="demo-event-log" aria-label="Last event">
        <h2>Last event</h2>
        <pre id="last-event">none</pre>
      </section>
    </main>
  </body>
</html>
