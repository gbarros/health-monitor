services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://health_monitor:health_monitor@db:5432/health_monitor}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      NEXUSLOG_MODE: ${NEXUSLOG_MODE:-stdout}
      NEXUSLOG_JSONL_PATH: ${NEXUSLOG_JSONL_PATH:-/app/var/nexuslog-events/health-monitor.jsonl}
      AGENT_RUNTIME: ${AGENT_RUNTIME:-pydantic-ai}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-llava}
      FOOD_ESTIMATOR: ${FOOD_ESTIMATOR:-ollama}
      LABEL_TEXT_EXTRACTOR: ${LABEL_TEXT_EXTRACTOR:-ollama}
      OPENFOODFACTS_ENABLED: ${OPENFOODFACTS_ENABLED:-true}
      USDA_ENABLED: ${USDA_ENABLED:-false}
      USDA_API_KEY: ${USDA_API_KEY:-}
      RESEARCH_LOOKUP_ENABLED: ${RESEARCH_LOOKUP_ENABLED:-false}
      LIVE_MODEL_TESTS: ${LIVE_MODEL_TESTS:-false}
      LIVE_MODEL_NAME: ${LIVE_MODEL_NAME:-ornith:9b}
      CLOUD_MODEL_CALLS_ENABLED: ${CLOUD_MODEL_CALLS_ENABLED:-false}
      CLOUD_MODEL_NAME: ${CLOUD_MODEL_NAME:-glm-5.2:cloud}
      PERSISTENCE_BACKEND: ${PERSISTENCE_BACKEND:-postgres}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/health-monitor.sqlite3}
    volumes:
      - app-data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "-m", "health_monitor", "worker"]
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${DATABASE_URL:-postgresql://health_monitor:health_monitor@db:5432/health_monitor}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      NEXUSLOG_MODE: ${NEXUSLOG_MODE:-stdout}
      NEXUSLOG_JSONL_PATH: ${NEXUSLOG_JSONL_PATH:-/app/var/nexuslog-events/health-monitor.jsonl}
      AGENT_RUNTIME: ${AGENT_RUNTIME:-pydantic-ai}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-llava}
      FOOD_ESTIMATOR: ${FOOD_ESTIMATOR:-ollama}
      LABEL_TEXT_EXTRACTOR: ${LABEL_TEXT_EXTRACTOR:-ollama}
      OPENFOODFACTS_ENABLED: ${OPENFOODFACTS_ENABLED:-true}
      USDA_ENABLED: ${USDA_ENABLED:-false}
      USDA_API_KEY: ${USDA_API_KEY:-}
      RESEARCH_LOOKUP_ENABLED: ${RESEARCH_LOOKUP_ENABLED:-false}
      LIVE_MODEL_TESTS: ${LIVE_MODEL_TESTS:-false}
      LIVE_MODEL_NAME: ${LIVE_MODEL_NAME:-ornith:9b}
      CLOUD_MODEL_CALLS_ENABLED: ${CLOUD_MODEL_CALLS_ENABLED:-false}
      CLOUD_MODEL_NAME: ${CLOUD_MODEL_NAME:-glm-5.2:cloud}
      PERSISTENCE_BACKEND: ${PERSISTENCE_BACKEND:-postgres}
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/health-monitor.sqlite3}
    volumes:
      - app-data:/app/data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-health_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-health_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-health_monitor}
    volumes:
      - postgres:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  app-data:
  postgres:
  backups:
